name: "CI/CD — medimesh-frontend"
run-name: "medimesh-frontend | ${{ github.event.head_commit.message }} (${{ github.sha }})"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:

  # Stage 1: SonarQube Code Quality Analysis
  sonarqube:
    uses: Medimesh-grp3/template-ci/.github/workflows/template-sonarqube.yml@main
    with:
      service_name: medimesh-frontend
      service_path: .
      sonar_project_key: medimesh-frontend
    secrets:
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      SONARQUBE_URL:   ${{ secrets.SONARQUBE_URL }}
      SMTP_USERNAME:   ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL:     ${{ secrets.ALERT_EMAIL }}

  # Stage 2: Build Dependencies & Snyk Security Scan
  build-snyk:
    needs: sonarqube
    uses: Medimesh-grp3/template-ci/.github/workflows/template-build-snyk.yml@main
    with:
      service_name: medimesh-frontend
      service_path: .
      node_version: "20"
    secrets:
      SNYK_TOKEN:    ${{ secrets.SNYK_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL:   ${{ secrets.ALERT_EMAIL }}

  # Stage 3: Docker Build + Trivy Scan + Push to DockerHub
  docker:
    needs: build-snyk
    uses: Medimesh-grp3/template-ci/.github/workflows/template-docker.yml@main
    with:
      service_name:      medimesh-frontend
      service_path:      .
      docker_image_name: medimesh_medimesh-frontend
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
      SMTP_USERNAME:      ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}

  # Stage 4: Approval Gate — Pauses for Human Approval
  # NOTE: No "if:" here — approval runs whenever docker runs on main
  approval:
    needs: docker
    uses: Medimesh-grp3/template-ci/.github/workflows/template-approval-gate.yml@main
    with:
      service_name: medimesh-frontend
      image_tag:    ${{ needs.docker.outputs.version }}
      values_key:   frontend
    secrets:
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL:   ${{ secrets.ALERT_EMAIL }}

  # Stage 5: CD — Update ArgoCD Manifest (runs after approval)
  deploy:
    needs: [docker, approval]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: Medimesh-grp3/template-ci/.github/workflows/template-cd.yml@main
    with:
      service_name: medimesh-frontend
      values_key:   frontend
      image_tag:    ${{ needs.docker.outputs.version }}
    secrets:
      MANIFEST_REPO_PAT: ${{ secrets.MANIFEST_REPO_PAT }}
      SMTP_USERNAME:     ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL:       ${{ secrets.ALERT_EMAIL }}

  # Final: Success Notification
  notify-success:
    name: "Pipeline Complete — medimesh-frontend"
    runs-on: ubuntu-latest
    needs: [sonarqube, build-snyk, docker, approval, deploy]
    if: |
      always() &&
      needs.docker.result == 'success' &&
      github.event_name != 'pull_request'
    steps:
      - name: Send Success Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "MediMesh CI/CD Passed — medimesh-frontend (${{ needs.docker.outputs.version }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI/CD Pipeline
          body: |
            ════════════════════════════════════════════════════════
            MediMesh CI/CD Pipeline — ALL STAGES PASSED
            ════════════════════════════════════════════════════════
            Service : medimesh-frontend
            Version : ${{ needs.docker.outputs.version }}
            Branch  : ${{ github.ref_name }}
            Commit  : ${{ github.sha }}
            Author  : ${{ github.actor }}
            ────────────────────────────────────────────────────────
            1. SonarQube  — Code quality passed
            2. Build      — Dependencies installed
            3. Snyk       — Security scan done
            4. Docker     — Image built
            5. Trivy      — Container scanned
            6. Push       — Image on DockerHub
            7. Approval   — Human approved deployment
            8. CD         — ArgoCD manifest updated
            ────────────────────────────────────────────────────────
            Image: ${{ secrets.DOCKERHUB_USERNAME }}/medimesh_medimesh-frontend:${{ needs.docker.outputs.version }}
            ArgoCD is now deploying to cluster automatically.
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ════════════════════════════════════════════════════════
